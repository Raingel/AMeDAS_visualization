name: recent_update

on:
  schedule:
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:
    inputs:
      log_level:
        description: "AMeDAS log level"
        required: false
        default: "DEBUG"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      AMEDAS_LOG_LEVEL: ${{ github.event.inputs.log_level || 'DEBUG' }}
      AMEDAS_SAMPLE_ONLY: "1"
      AMEDAS_SAMPLE_STATIONS: "a1051,a1054,a1203,s47584"
      AMEDAS_SAMPLE_LIMIT: "4"
      AMEDAS_SAVE_HTTP_DUMP: "1"
      AMEDAS_HTTP_DUMP_DIR: "debug_http"
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: exec AMeDAS_parser
      run: |
        python AMeDAS_parser_recent.py 2>&1 | tee amedas_recent.log
    - name: Upload debug log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: amedas-recent-log
        path: amedas_recent.log
    - name: Upload HTTP traces
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: amedas-recent-http-dump
        path: debug_http
    - name: Commit files
      continue-on-error: true
      run: |
        git config --global user.email "allenstorm2005@gmail.com"
        git config --global user.name "Raingel(Github Action)"
        git add .
        git commit -m "`date '+%Y-%m-%d %H:%M:%S'`"
        git pull --rebase
    - name: Push changes
      continue-on-error: true
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
