name: Full_update

on:
  schedule:
    - cron: '0 0 1 1 *'
  workflow_dispatch:
    inputs:
      log_level:
        description: 'AMeDAS log level'
        required: false
        default: 'INFO'
        type: choice
        options:
          - INFO
          - DEBUG
          - WARNING

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: '1'
      AMEDAS_LOG_LEVEL: ${{ github.event.inputs.log_level || 'INFO' }}
      AMEDAS_SAMPLE_ONLY: '0'
      AMEDAS_BATCH_SIZE: '3'
      AMEDAS_TIME_LIMIT_MINUTES: '330'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run full refresh
        run: |
          python AMeDAS_parser_2025_1_4.py 2>&1 | tee amedas_full.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amedas-full-log
          path: amedas_full.log
      - name: Commit and push changes
        run: |
          git config user.email 'allenstorm2005@gmail.com'
          git config user.name 'Raingel(GitHub Action)'
          git add weather_data
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m "full update $(date '+%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push origin HEAD:main
