name: Backfill_update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: '1'
      AMEDAS_LOG_LEVEL: 'INFO'
      AMEDAS_BACKFILL_START: '2025-10'
      AMEDAS_SAMPLE_ONLY: '0'
      AMEDAS_BATCH_SIZE: '3'
      AMEDAS_TIME_LIMIT_MINUTES: '330'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backfill
        run: |
          python AMeDAS_backfill.py 2>&1 | tee amedas_backfill.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amedas-backfill-log
          path: amedas_backfill.log
      - name: Commit and push changes
        run: |
          git config user.email 'allenstorm2005@gmail.com'
          git config user.name 'Raingel(GitHub Action)'
          git add weather_data
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m "backfill update $(date '+%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push origin HEAD:main
