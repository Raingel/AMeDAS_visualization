name: Backfill_update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: "1"
      AMEDAS_LOG_LEVEL: "INFO"
      AMEDAS_BACKFILL_START: "2025-10"
      AMEDAS_SAMPLE_ONLY: "0"
      AMEDAS_SAVE_HTTP_DUMP: "1"
      AMEDAS_HTTP_DUMP_DIR: "debug_http"
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.10
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run backfill (auto-stop at 5.5h)
        continue-on-error: true
        run: |
          timeout --signal=SIGTERM 5h30m python AMeDAS_backfill.py 2>&1 | tee amedas_backfill.log
      - name: Upload backfill log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amedas-backfill-log
          path: amedas_backfill.log
      - name: Upload HTTP traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amedas-backfill-http-dump
          path: debug_http
      - name: Commit partial progress
        continue-on-error: true
        run: |
          git config --global user.email "allenstorm2005@gmail.com"
          git config --global user.name "Raingel(Github Action)"
          git add weather_data debug_http || true
          git commit -m "backfill progress $(date '+%Y-%m-%d %H:%M:%S')" || true
          git pull --rebase
      - name: Push changes
        continue-on-error: true
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
